{{- if .Values.ingress.enabled -}}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "be.fullname" . }}-docs-redirect
  labels:
    {{- include "be.labels" . | nindent 4 }}
spec:
  redirectRegex:
    regex: "^https?://([^/]+)/$"
    replacement: "https://${1}/docs"
{{- end }}
