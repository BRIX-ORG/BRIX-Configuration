apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fe.fullname" . }}
  labels:
    {{- include "fe.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.env.NODE_ENV | default "production" | quote }}
  {{- range $key, $value := .Values.env }}
  {{- if ne $key "NODE_ENV" }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
