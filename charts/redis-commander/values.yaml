# -- Default values for Redis Commander (dev tool)
enabled: true

replicaCount: 1

image:
  repository: ghcr.io/joeferner/redis-commander
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081

ingress:
  enabled: false
  className: traefik
  annotations: {}
  hosts: []
  tls: []

env:
  REDIS_HOSTS: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
