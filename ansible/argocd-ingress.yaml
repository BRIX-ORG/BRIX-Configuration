# ============================================
# ArgoCD Server Ingress (Traefik)
# ============================================
# Exposes ArgoCD Web UI at: http://argocd.brix.social
# -- TODO: Update to https:// when SSL is configured
# ============================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    # -- Traefik entrypoint: websecure (HTTPS, port 443)
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  rules:
    - host: argocd.brix.social
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
  tls:
    - secretName: argocd-server-tls
      hosts:
        - argocd.brix.social
