name: infrastructure-stop
on:
  workflow_dispatch:

jobs:
  stop:
    runs-on: ubuntu-latest
    steps:
      - name: Stop All BRIX EC2 Instances
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=BRIX" "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)
          if [ -n "$INSTANCE_IDS" ]; then
            echo "🛑 Stopping instances: $INSTANCE_IDS"
            aws ec2 stop-instances --instance-ids $INSTANCE_IDS

            echo "## 🛑 BRIX Instances Stopped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            for ID in $INSTANCE_IDS; do
              NAME=$(aws ec2 describe-tags --filters "Name=resource-id,Values=$ID" "Name=key,Values=Name" --query 'Tags[0].Value' --output text)
              echo "- \`${NAME}\` (${ID})" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "ℹ️ No running BRIX instances found"
            echo "## ℹ️ No running instances found" >> $GITHUB_STEP_SUMMARY
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
