# ============================================
# BRIX Image Service - PROD Environment
# ============================================

replicaCount: 2

image:
  repository: ghcr.io/brix-org/brix-image-service
  tag: "v1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5000
  targetPort: 5000

ingress:
  enabled: false

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

env:
  FLASK_ENV: "production"
  PORT: "5000"

secretEnv:
  MINIO_ENDPOINT: "brix-minio.brix-prod.svc.cluster.local:9000"
  MINIO_ACCESS_KEY: "CHANGE_ME"
  MINIO_SECRET_KEY: "CHANGE_ME"
