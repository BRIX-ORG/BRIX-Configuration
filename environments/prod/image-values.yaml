# ============================================
# BRIX Image Service - PROD Environment
# ============================================

replicaCount: 1

image:
  repository: jonasaugust12/brix-vision
  tag: "prod-654e1c5"
  pullPolicy: IfNotPresent

# -- Must match template structure: probes.liveness / probes.readiness
probes:
  liveness:
    path: /health
    initialDelaySeconds: 120
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 5
  readiness:
    path: /health
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 5

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

ingress:
  enabled: false

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

env:
  FLASK_ENV: "production"
  VISION_PORT: "8000"

secretEnv:
  MINIO_ENDPOINT: "brix-minio.brix-prod.svc.cluster.local:9000"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin"
