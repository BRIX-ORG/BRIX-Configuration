# ============================================
# BRIX Backend - PROD Environment
# ============================================

replicaCount: 1

image:
  repository: jonasaugust12/brix-server
  tag: "prod-88b66ab"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: api.brix.social
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: brix-be-prod-tls
      hosts:
        - api.brix.social

imagePullSecrets:
  - name: regcred

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80

migration:
  enabled: true
  command: ["pnpm", "prisma:migrate:deploy"]

env:
  NODE_ENV: "production"
  PORT: "8080"
  APP_PORT: "8080"
  
  # Database Routing (Non-Secret)
  DB_HOST: "brix-postgres-postgresql-primary.brix-prod.svc.cluster.local"
  DB_PORT: "5432"
  DB_DATABASE: "brix_db"
  DATABASE_URL: "postgresql://brix_user:brix_password@brix-postgres-postgresql-primary.brix-prod.svc.cluster.local:5432/brix_db"
  
  # Redis Routing
  REDIS_HOST: "brix-redis-master.brix-prod.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  # MinIO Routing
  MINIO_ENDPOINT: "brix-minio.brix-prod.svc.cluster.local"
  MINIO_PORT: "9000"
  MINIO_USE_SSL: "false"
  MINIO_PUBLIC_URL: "http://brix-minio.brix-prod.svc.cluster.local:9000"

  # Vision Service Routing
  VISION_API_URL: "http://brix-image-service.brix-prod.svc.cluster.local:8000"
  VISION_PORT: "8000"

# Sensitive variables (Passwords, Tokens, Keys) are natively injected via Docker image build.
