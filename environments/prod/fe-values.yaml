# ============================================
# BRIX Frontend - PROD Environment
# ============================================

replicaCount: 1

image:
  repository: jonasaugust12/brix-web
  # -- Always pin to a specific version in prod
  tag: "prod-3c33540"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # -- Uncomment if using cert-manager
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: brix.social
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: brix-fe-tls
      hosts:
        - brix.social

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80

env:
  NODE_ENV: "production"
  NEXT_PUBLIC_API_URL: "https://api.brix.social"
  INTERNAL_API_URL: "http://brix-be.brix-prod.svc.cluster.local:3000"
