# ============================================
# MinIO - PROD Environment (Bitnami Chart)
# ============================================

# -- Bypass Bitnami chart security check (bitnami/* images no longer public)
global:
  security:
    allowInsecureImages: true

image:
  registry: docker.io
  repository: bitnamilegacy/minio
  tag: 2024.11.7-debian-12-r2

auth:
  rootUser: "minioadmin"
  rootPassword: "minioadmin"

persistence:
  enabled: true
  size: 50Gi
  storageClass: "local-path"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

service:
  type: ClusterIP
  ports:
    api: 9000
    console: 9001

ingress:
  enabled: false
