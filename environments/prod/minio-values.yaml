# ============================================
# MinIO - PROD Environment (Bitnami Chart)
# ============================================

auth:
  rootUser: "minioadmin"
  rootPassword: "minioadmin"

image:
  tag: "2024.11.7-debian-12-r2"

mode: standalone

persistence:
  enabled: true
  size: 50Gi
  storageClass: "local-path"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# -- No public access
apiIngress:
  enabled: false

ingress:
  enabled: false

defaultBuckets: "brix,brix-uploads,brix-avatars,brix-media"
