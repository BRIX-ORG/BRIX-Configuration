# ============================================
# PostgreSQL - DEV Environment (Bitnami Chart)
# ============================================
# Image managed by Bitnami chart - do NOT override with bitnamilegacy

auth:
  postgresPassword: "brix_password"
  username: "brix_user"
  password: "brix_password"
  database: "brix_db"

# -- Disable replication for dev
architecture: standalone

primary:
  persistence:
    enabled: true
    size: 5Gi
    # -- K3s default storage class: local-path
    storageClass: "local-path"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

metrics:
  enabled: false
