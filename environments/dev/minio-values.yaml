# ============================================
# MinIO - DEV Environment (Bitnami Chart)
# ============================================
# Chart: https://github.com/bitnami/charts/tree/main/bitnami/minio

image:
  tag: "2024.11.7-debian-12-r2"

# -- Single node for dev
mode: standalone

persistence:
  enabled: true
  size: 5Gi
  storageClass: "local-path"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# -- MinIO Console (Web UI)
apiIngress:
  enabled: false

ingress:
  enabled: false

# -- Default buckets to create
defaultBuckets: "brix,brix-uploads,brix-avatars,brix-media"
