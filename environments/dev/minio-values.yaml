# ============================================
# MinIO - DEV Environment (Bitnami Chart)
# ============================================
# Chart: https://github.com/bitnami/charts/tree/main/bitnami/minio

auth:
  rootUser: "minioadmin"
  rootPassword: "minioadmin"

# -- Single node for dev
mode: standalone

persistence:
  enabled: true
  size: 10Gi
  storageClass: "local-path"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# -- MinIO Console (Web UI)
apiIngress:
  enabled: false

ingress:
  enabled: false

# -- Default buckets to create
defaultBuckets: "brix-uploads,brix-avatars,brix-media"
