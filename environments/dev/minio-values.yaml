# ============================================
# MinIO - DEV Environment (Bitnami Chart)
# ============================================
# Image managed by Bitnami chart - do NOT override with bitnamilegacy

auth:
  rootUser: "brix_admin"
  rootPassword: "brix_password"

persistence:
  enabled: true
  size: 10Gi
  storageClass: "local-path"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  ports:
    api: 9000
    console: 9001

ingress:
  enabled: false
