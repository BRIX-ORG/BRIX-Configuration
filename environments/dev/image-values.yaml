# ============================================
# BRIX Image Service - DEV Environment
# ============================================

replicaCount: 1

image:
  repository: jonasaugust12/brix-vision
  tag: "dev-efaf72d"
  pullPolicy: Always

# -- Must match template structure: probes.liveness / probes.readiness
probes:
  liveness:
    path: /health
    initialDelaySeconds: 120
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 5
  readiness:
    path: /health
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 5

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

ingress:
  enabled: false

# -- BLIP model needs ~1GB RAM to load; previous 512Mi caused OOMKill
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: false

env:
  FLASK_ENV: "development"
  VISION_PORT: "8000"

secretEnv:
  MINIO_ENDPOINT: "brix-minio.brix-dev.svc.cluster.local:9000"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin"
