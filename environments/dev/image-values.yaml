# ============================================
# BRIX Image Service - DEV Environment
# ============================================

replicaCount: 1

image:
  repository: jonasaugust12/brix-vision
  tag: "dev-1a74bbf"
  pullPolicy: Always

livenessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 120
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 60
  periodSeconds: 10

service:
  type: ClusterIP
  port: 5000
  targetPort: 5000

ingress:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: false

env:
  FLASK_ENV: "development"
  PORT: "5000"

secretEnv:
  MINIO_ENDPOINT: "brix-minio.brix-dev.svc.cluster.local:9000"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin"
