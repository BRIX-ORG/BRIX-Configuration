# ============================================
# Redis Commander - DEV Environment ONLY
# ============================================
# Chart: https://github.com/joeferner/redis-commander
# Image: ghcr.io/joeferner/redis-commander

# -- Only enabled in dev
enabled: true

replicaCount: 1

image:
  repository: ghcr.io/joeferner/redis-commander
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081

# -- Expose via Traefik for dev debugging (optional)
ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: redis-dev.brix.social
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: brix-redis-commander-dev-tls
      hosts:
        - redis-dev.brix.social

env:
  REDIS_HOSTS: "local:brix-redis-master.brix-dev.svc.cluster.local:6379"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
