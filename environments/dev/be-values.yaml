# ============================================
# BRIX Backend - DEV Environment
# ============================================

replicaCount: 1

image:
  repository: jonasaugust12/brix-server
  tag: "dev-ef662c8"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: api.dev.brix.social
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: brix-be-dev-tls
      hosts:
        - api.dev.brix.social

imagePullSecrets:
  - name: regcred

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: false

migration:
  enabled: true
  command: ["pnpm", "prisma:migrate:deploy"]

env:
  NODE_ENV: "development"
  PORT: "8080"
  APP_PORT: "8080"
  
  # Database Routing (Non-Secret)
  DB_HOST: "brix-postgres-postgresql.brix-dev.svc.cluster.local"
  DB_PORT: "5432"
  DB_DATABASE: "brix_db"
  DATABASE_URL: "postgresql://brix_user:brix_password@brix-postgres-postgresql.brix-dev.svc.cluster.local:5432/brix_db"
  
  # Redis Routing
  REDIS_HOST: "brix-redis-master.brix-dev.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  # MinIO Routing
  MINIO_ENDPOINT: "brix-minio.brix-dev.svc.cluster.local"
  MINIO_PORT: "9000"
  MINIO_USE_SSL: "false"
  MINIO_PUBLIC_URL: "http://brix-minio.brix-dev.svc.cluster.local:9000"

  # Vision Service Routing
  VISION_API_URL: "http://brix-image-service.brix-dev.svc.cluster.local:8000"
  VISION_PORT: "8000"

# Sensitive variables (Passwords, Tokens, Keys) are natively injected via Docker image build.
