# ============================================
# Redis - DEV Environment (Bitnami Chart)
# ============================================
# Chart: https://github.com/bitnami/charts/tree/main/bitnami/redis
# Image managed by Bitnami chart - do NOT override with bitnamilegacy

# -- Disable auth for dev simplicity
auth:
  enabled: false

# -- Disable replication for dev
architecture: standalone

master:
  persistence:
    enabled: true
    size: 1Gi
    storageClass: "local-path"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

metrics:
  enabled: false
