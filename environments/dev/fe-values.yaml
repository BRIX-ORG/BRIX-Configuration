# ============================================
# BRIX Frontend - DEV Environment
# ============================================

replicaCount: 1

image:
  repository: ghcr.io/brix-org/brix-web
  tag: "dev-latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
  hosts:
    - host: app-dev.brix.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false

env:
  NODE_ENV: "development"
  # -- FE calls BE via K8s internal DNS (server-side only)
  NEXT_PUBLIC_API_URL: ""
  INTERNAL_API_URL: "http://brix-be.brix-dev.svc.cluster.local:3000"
