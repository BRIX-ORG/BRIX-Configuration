# ============================================
# BRIX Frontend - DEV Environment
# ============================================
# -- Number of replica pods
replicaCount: 1

image:
  repository: ghcr.io/brix-org/brix-web
  tag: "dev-latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
  hosts:
    - host: dev.brix.social
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
