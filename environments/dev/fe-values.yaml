# ============================================
# BRIX Frontend - DEV Environment
# ============================================
# -- Number of replica pods
replicaCount: 1

image:
  repository: jonasaugust12/brix-web
  tag: "dev-013ae31"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: dev.brix.social
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: brix-fe-dev-tls
      hosts:
        - dev.brix.social

imagePullSecrets:
  - name: regcred

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
