apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: brix-cluster-issuer
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: brix
    environment: infra
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/BRIX-ORG/BRIX-Configuration.git
    targetRevision: main
    path: environments/infra/cluster-issuer
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
