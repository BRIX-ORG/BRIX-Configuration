# ============================================
# ArgoCD Application - Redis (PROD)
# Uses Bitnami Helm chart
# ============================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: brix-redis-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: brix
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: brix-prod
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: redis
    targetRevision: 20.*.*
    helm:
      releaseName: brix-redis
      valueFiles: []
      values: |
        {{- .Files.Get "../../environments/prod/redis-values.yaml" }}
  destination:
    server: https://kubernetes.default.svc
    namespace: brix-prod
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
